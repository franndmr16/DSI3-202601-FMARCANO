<button (click)="changeOption(1)">Juego</button>
<button (click)="changeOption(2)">Mundial</button>
<button (click)="changeOption(0)">clear</button>

@switch (this.option) {
  @case (1) {
    <app-game></app-game>
  }
  @case (2){
  <app-mundial></app-mundial>
  }
  @default {
    <p>Debe seleccionar una opción</p>
  }
}
