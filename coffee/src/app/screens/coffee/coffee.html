<app-header></app-header>

<main class="main">

  </section>

  <section class="featured">
    <h2 class="featured__title">Nuestras bebidas estrellas</h2>
    
    <div class="featured__grid">
      <figure class="featured__item">
        <img src="img/imagen1Cafe.png" alt="Hot Chocolate" class="featured__image">
      </figure>

      <figure class="featured__item">
        <img src="img/imagen2Cafe.png" alt="Latte" class="featured__image">

      <figure class="featured__item">
        <img src="img/imagen3Cafe.png" alt="Latte Art" class="featured__image">
      </figure>
    </div>
  </section>

  <section class="promo">
    <div class="promo__content">
