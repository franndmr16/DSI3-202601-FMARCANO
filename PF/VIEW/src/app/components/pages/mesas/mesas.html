<div class="dashboard-page">
  <aside class="dashboard-page__sidebar">
    <app-sidebar-nav></app-sidebar-nav>
  </aside>

  <main class="dashboard-page__main">
    <header class="page-header">
      <h1>Mesas</h1>
      <button class="btn-new" (click)="abrirModal()">+ NUEVA MESA</button>
    </header>

    <div class="table-filters">
      <button class="filter-btn active">Todas ({{mesas.length}})</button>
      <button class="filter-btn">Disponibles</button>
      <button class="filter-btn">Ocupadas</button>
    </div>

    <app-tables-manager [tables]="mesas"></app-tables-manager>
  </main>
</div>

<div class="modal-overlay" *ngIf="isModalOpen">
  <div class="modal-content">
    <h3>Nueva Mesa</h3>
    <form [formGroup]="mesaForm" (ngSubmit)="guardarMesa()">
      
      <div class="form-group">
        <label>Número de mesa</label>
        <input formControlName="numeroMesa" placeholder="Ej: 1" type="number" required>
      </div>

      <div class="form-group">
        <label>Capacidad</label>
        <input formControlName="capacidad" placeholder="Ej: 4" type="number" required>
      </div>
      
      <div class="modal-actions">
        <button type="button" class="btn-cancel" (click)="cerrarModal()">Cancelar</button>
        <button type="submit" class="btn-save" [disabled]="mesaForm.invalid">Guardar</button>
      </div>
    </form>
  </div>
</div>
