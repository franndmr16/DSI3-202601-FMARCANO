div class="layout">
  <div class="sidebar">
  </div>
  <div class="pokemon-grid">
    <div class="pokemon-card" *ngFor="let pokemon of linksPokemon">
      <img [src]="pokemon.sprites.front_default" [alt]="pokemon.name" />
      <p class="pokemon-name">{{ pokemon.name }}</p>
      <div class="pokemon-types">
        <span *ngFor="let t of pokemon.types">{{ t.type.name }}</span>
      </div>
    </div>
  </div>
</div>
